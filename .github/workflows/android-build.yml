name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export-apk:
    runs-on: ubuntu-latest
    name: Export APK
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Export game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.3/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.3/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          cache: true
          export_debug: true
          presets_to_export: Android
          use_preset_export_path: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flappybird-apk
          path: ${{ steps.export.outputs.build_directory }}/*.apk
